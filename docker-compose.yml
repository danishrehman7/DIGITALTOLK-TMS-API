services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: digitaltolk_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - vendor_data:/var/www/html/vendor
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - digitaltolk

  nginx:
    image: nginx:alpine
    container_name: digitaltolk_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
      - vendor_data:/var/www/html/vendor
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - digitaltolk

  mysql:
    image: mysql:8.0
    container_name: digitaltolk_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: digitaltolk
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: digitaltolk
      MYSQL_PASSWORD: secret
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      timeout: 20s
      retries: 10
      interval: 5s
    networks:
      - digitaltolk

  redis:
    image: redis:alpine
    container_name: digitaltolk_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - digitaltolk

networks:
  digitaltolk:
    driver: bridge

volumes:
  mysql_data:
  vendor_data: