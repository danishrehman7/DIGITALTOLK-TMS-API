openapi: 3.0.3

info:
  title: DigitalTolk Translation Management API
  description: >
    API-driven Translation Management Service built with Laravel.
    Supports multiple locales, translation keys, content search, tag filtering,
    token-based authentication, and JSON export for frontend applications.
  version: 1.0.0

servers:
  - url: http://127.0.0.1:8000/api
    description: Local Laravel API Server
  - url: http://localhost:8000/api
    description: Localhost API Server

tags:
  - name: Auth
    description: Authentication and token handling
  - name: Translations
    description: Translation CRUD, search, and export endpoints

security:
  - bearerAuth: []

paths:
  /translations:
    get:
      tags:
        - Translations
      summary: List and search translations
      description: >
        Returns paginated translations. You can filter translations by locale,
        key, tag, or content.
      operationId: listTranslations
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AcceptJson'
        - name: locale
          in: query
          required: false
          description: Filter by locale code, for example en, fr, es.
          schema:
            type: string
            example: en
        - name: key
          in: query
          required: false
          description: Search by translation key.
          schema:
            type: string
            example: home.title
        - name: tag
          in: query
          required: false
          description: Filter by tag name.
          schema:
            type: string
            example: web
        - name: content
          in: query
          required: false
          description: Search inside translation content.
          schema:
            type: string
            example: Welcome
        - name: per_page
          in: query
          required: false
          description: Number of records per page.
          schema:
            type: integer
            default: 20
            example: 20
      responses:
        '200':
          description: Paginated translation list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedTranslations'
        '401':
          $ref: '#/components/responses/Unauthenticated'

    post:
      tags:
        - Translations
      summary: Create a translation
      description: Creates a new translation with locale, key, content, and optional tags.
      operationId: createTranslation
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AcceptJson'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTranslationRequest'
            example:
              locale: en
              key: home.title
              content: Welcome Home
              tags:
                - web
                - desktop
      responses:
        '201':
          description: Translation created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Translation'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '422':
          $ref: '#/components/responses/ValidationError'

  /translations/{translation}:
    get:
      tags:
        - Translations
      summary: Get translation details
      description: Returns a single translation by ID.
      operationId: getTranslation
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AcceptJson'
        - name: translation
          in: path
          required: true
          description: Translation ID.
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: Translation details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Translation'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags:
        - Translations
      summary: Update a translation
      description: Updates translation locale, key, content, and tags.
      operationId: updateTranslationPut
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AcceptJson'
        - name: translation
          in: path
          required: true
          description: Translation ID.
          schema:
            type: integer
            example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTranslationRequest'
            example:
              locale: en
              key: home.title
              content: Updated Welcome Home
              tags:
                - mobile
                - web
      responses:
        '200':
          description: Translation updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Translation'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'

    patch:
      tags:
        - Translations
      summary: Partially update a translation
      description: Partially updates translation locale, key, content, or tags.
      operationId: updateTranslationPatch
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AcceptJson'
        - name: translation
          in: path
          required: true
          description: Translation ID.
          schema:
            type: integer
            example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTranslationRequest'
            example:
              content: Updated Content
              tags:
                - mobile
      responses:
        '200':
          description: Translation updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Translation'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'

    delete:
      tags:
        - Translations
      summary: Delete a translation
      description: Deletes a translation by ID.
      operationId: deleteTranslation
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AcceptJson'
        - name: translation
          in: path
          required: true
          description: Translation ID.
          schema:
            type: integer
            example: 1
      responses:
        '204':
          description: Translation deleted successfully
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '404':
          $ref: '#/components/responses/NotFound'

  /translations/export/{locale}:
    get:
      tags:
        - Translations
      summary: Export translations by locale
      description: >
        Returns key-value JSON translations for a specific locale.
        This endpoint is designed for frontend applications such as Vue.js.
      operationId: exportTranslations
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AcceptJson'
        - name: locale
          in: path
          required: true
          description: Locale code to export.
          schema:
            type: string
            example: en
        - name: tag
          in: query
          required: false
          description: Optional tag filter for export.
          schema:
            type: string
            example: web
      responses:
        '200':
          description: Locale translation export
          headers:
            Cache-Control:
              description: CDN-friendly cache header.
              schema:
                type: string
                example: public, max-age=60, stale-while-revalidate=300
            ETag:
              description: Entity tag for cache validation.
              schema:
                type: string
                example: '"translations-en-123456"'
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: string
              example:
                home.title: Welcome Home
                home.subtitle: Fast Translation API
                checkout.button: Pay Now
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Sanctum API Token
      description: >
        Enter your Laravel Sanctum plain text token only.
        Do not write "Bearer" manually; Swagger will add it automatically.

  parameters:
    AcceptJson:
      name: Accept
      in: header
      required: true
      description: Forces Laravel to return JSON responses instead of redirecting to web routes.
      schema:
        type: string
        default: application/json
        example: application/json

  schemas:
    Locale:
      type: object
      properties:
        id:
          type: integer
          example: 1
        code:
          type: string
          example: en
        name:
          type: string
          example: English
        created_at:
          type: string
          format: date-time
          example: '2026-05-10T10:00:00.000000Z'
        updated_at:
          type: string
          format: date-time
          example: '2026-05-10T10:00:00.000000Z'

    TranslationKey:
      type: object
      properties:
        id:
          type: integer
          example: 1
        key:
          type: string
          example: home.title
        created_at:
          type: string
          format: date-time
          example: '2026-05-10T10:00:00.000000Z'
        updated_at:
          type: string
          format: date-time
          example: '2026-05-10T10:00:00.000000Z'

    Tag:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: web
        created_at:
          type: string
          format: date-time
          example: '2026-05-10T10:00:00.000000Z'
        updated_at:
          type: string
          format: date-time
          example: '2026-05-10T10:00:00.000000Z'

    Translation:
      type: object
      properties:
        id:
          type: integer
          example: 1
        locale_id:
          type: integer
          example: 1
        translation_key_id:
          type: integer
          example: 1
        content:
          type: string
          example: Welcome Home
        created_at:
          type: string
          format: date-time
          example: '2026-05-10T10:00:00.000000Z'
        updated_at:
          type: string
          format: date-time
          example: '2026-05-10T10:00:00.000000Z'
        locale:
          $ref: '#/components/schemas/Locale'
        translation_key:
          $ref: '#/components/schemas/TranslationKey'
        tags:
          type: array
          items:
            $ref: '#/components/schemas/Tag'

    CreateTranslationRequest:
      type: object
      required:
        - locale
        - key
        - content
      properties:
        locale:
          type: string
          description: Locale code.
          example: en
        key:
          type: string
          description: Translation key.
          example: home.title
        content:
          type: string
          description: Translation content.
          example: Welcome Home
        tags:
          type: array
          description: Context tags.
          items:
            type: string
          example:
            - web
            - desktop

    UpdateTranslationRequest:
      type: object
      properties:
        locale:
          type: string
          description: Locale code.
          example: en
        key:
          type: string
          description: Translation key.
          example: home.title
        content:
          type: string
          description: Translation content.
          example: Updated Welcome Home
        tags:
          type: array
          description: Context tags.
          items:
            type: string
          example:
            - mobile
            - web

    PaginatedTranslations:
      type: object
      properties:
        current_page:
          type: integer
          example: 1
        data:
          type: array
          items:
            $ref: '#/components/schemas/Translation'
        first_page_url:
          type: string
          example: http://127.0.0.1:8000/api/translations?page=1
        from:
          type: integer
          example: 1
        last_page:
          type: integer
          example: 5
        last_page_url:
          type: string
          example: http://127.0.0.1:8000/api/translations?page=5
        links:
          type: array
          items:
            type: object
            properties:
              url:
                type: string
                nullable: true
                example: http://127.0.0.1:8000/api/translations?page=1
              label:
                type: string
                example: '1'
              active:
                type: boolean
                example: true
        next_page_url:
          type: string
          nullable: true
          example: http://127.0.0.1:8000/api/translations?page=2
        path:
          type: string
          example: http://127.0.0.1:8000/api/translations
        per_page:
          type: integer
          example: 20
        prev_page_url:
          type: string
          nullable: true
          example: null
        to:
          type: integer
          example: 20
        total:
          type: integer
          example: 100

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
          example: Unauthenticated.

    ValidationErrorResponse:
      type: object
      properties:
        message:
          type: string
          example: The given data was invalid.
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          example:
            locale:
              - The locale field is required.
            key:
              - The key field is required.

  responses:
    Unauthenticated:
      description: Unauthenticated request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            message: Unauthenticated.

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            message: Not Found.

    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationErrorResponse'
          example:
            message: The given data was invalid.
            errors:
              locale:
                - The locale field is required.
              key:
                - The key field is required.